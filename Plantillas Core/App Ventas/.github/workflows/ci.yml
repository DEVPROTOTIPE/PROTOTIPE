name: CI/CD Pipeline - Core Ventas

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Unit Tests with Coverage (Firestore/Auth rules validated via Emulator)
        run: npx firebase-tools emulators:exec --only firestore,auth --project test-prototipe-rules "npx vitest run --coverage"

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npx playwright test

      - name: Build Application
        run: npm run build
